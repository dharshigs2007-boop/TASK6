<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f7fa;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

.checkout-form,
.order-summary{
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:20px;
    color:#333;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.payment-method{
    margin-top:20px;
}

.payment-method label{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    cursor:pointer;
}

.payment-method input{
    width:auto;
}

.order-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
}

.summary-total{
    margin-top:20px;
}

.summary-total div{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.grand-total{
    font-size:22px;
    font-weight:bold;
    color:#28a745;
}

.place-order{
    width:100%;
    padding:14px;
    background:#28a745;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

.place-order:hover{
    background:#218838;
}

@media(max-width:768px){
    .container{
        grid-template-columns:1fr;
    }

    .row{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- Billing Details -->
    <div class="checkout-form">

        <h2>Billing Details</h2>

        <form id="checkoutForm">

            <div class="row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea rows="3" required></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>ZIP Code</label>
                    <input type="text" required>
                </div>
            </div>

            <div class="form-group">
                <label>Country</label>
                <select required>
                    <option value="">Select Country</option>
                    <option>India</option>
                    <option>USA</option>
                    <option>UK</option>
                    <option>Canada</option>
                </select>
            </div>

            <div class="payment-method">
                <h2>Payment Method</h2>

                <label>
                    <input type="radio" name="payment" checked>
                    Credit / Debit Card
                </label>

                <label>
                    <input type="radio" name="payment">
                    UPI Payment
                </label>

                <label>
                    <input type="radio" name="payment">
                    Cash on Delivery
                </label>
            </div>

        </form>

    </div>

    <!-- Order Summary -->
    <div class="order-summary">

        <h2>Order Summary</h2>

        <div class="order-item">
            <span>Wireless Headphones</span>
            <span>₹2,999</span>
        </div>

        <div class="order-item">
            <span>Smart Watch</span>
            <span>₹4,999</span>
        </div>

        <div class="summary-total">
            <div>
                <span>Subtotal</span>
                <span>₹7,998</span>
            </div>

            <div>
                <span>Shipping</span>
                <span>₹100</span>
            </div>

            <div class="grand-total">
                <span>Total</span>
                <span>₹8,098</span>
            </div>
        </div>

        <button class="place-order" onclick="placeOrder()">
            Place Order
        </button>

    </div>

</div>

<script>
function placeOrder(){

    const form = document.getElementById("checkoutForm");

    if(form.checkValidity()){
        alert("🎉 Order Placed Successfully!");
    }else{
        form.reportValidity();
    }
}
</script>

</body>
</html>
